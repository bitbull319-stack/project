<!DOCTYPE html>
<html class="light" lang="vi">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>ONYSSTU - Danh Mục Sản Phẩm</title>
  
  <!-- Tailwind CSS & Google Fonts -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  
  <!-- Custom Styling -->
  <link rel="stylesheet" href="./assets/css/style.css">
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#000000",
            "on-primary": "#ffffff",
            "secondary": "#5e604d",
            "background": "#f9f9f9",
            "surface": "#f9f9f9",
            "surface-bright": "#f9f9f9",
            "surface-container-lowest": "#ffffff",
            "surface-container-low": "#f3f3f3",
            "surface-container": "#eeeeee",
            "surface-container-high": "#e8e8e8",
            "surface-container-highest": "#e2e2e2",
            "on-surface": "#1b1b1b",
            "on-surface-variant": "#4c4546",
            "outline": "#7e7576",
            "outline-variant": "#cfc4c5",
            "secondary-container": "#e1e1c9",
            "on-secondary-container": "#636451",
            "tertiary-fixed": "#e7e3d1",
            "on-tertiary-fixed-variant": "#49473a"
          },
          borderRadius: {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "9999px"
          },
          spacing: {
            "sm": "16px",
            "base": "4px",
            "lg": "40px",
            "container-max": "1280px",
            "xs": "8px",
            "xl": "64px",
            "gutter": "20px",
            "md": "24px"
          }
        }
      }
    }
  </script>
</head>
<body class="bg-surface text-on-surface select-none pb-24 md:pb-12">

  <!-- Top Navigation Bar -->
  <nav class="fixed top-0 left-0 w-full z-40 bg-surface/90 backdrop-blur-md flex justify-between items-center px-sm h-16 border-b border-outline-variant">
    <div class="flex items-center gap-4">
      <a href="./categories.html" class="transition-all duration-200 active:scale-95 hover:opacity-70 flex items-center">
        <span class="material-symbols-outlined text-primary">menu</span>
      </a>
    </div>
    <div class="absolute left-1/2 -translate-x-1/2">
      <a href="./index.html" class="font-bold tracking-widest text-primary text-xl uppercase">ONYSSTU</a>
    </div>
    <div class="flex items-center gap-4 relative">
      <a href="./categories.html?search=true" class="hover:opacity-75">
        <span class="material-symbols-outlined text-primary">search</span>
      </a>
      <button class="cart-trigger relative transition-all duration-200 active:scale-95 hover:opacity-70">
        <span class="material-symbols-outlined text-primary">shopping_bag</span>
        <span class="cart-count absolute -top-1.5 -right-1.5 bg-primary text-on-primary text-[9px] w-4.5 h-4.5 rounded-full flex items-center justify-center font-bold hidden">0</span>
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="pt-24 max-w-container-max mx-auto px-sm md:px-lg">
    
    <!-- Controls section: Filter tabs, Search input & Sort -->
    <section class="space-y-md mb-lg">
      <div class="flex flex-col sm:flex-row gap-sm justify-between sm:items-center">
        <!-- Interactive search field -->
        <div class="relative flex-1 max-w-md">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant text-base">search</span>
          <input type="text" id="catalog-search" placeholder="Tìm kiếm sản phẩm..." class="w-full pl-10 pr-4 py-2 border border-outline-variant bg-white text-xs focus:ring-0 focus:border-primary">
        </div>
        
        <!-- Sort Select -->
        <div class="flex items-center gap-base">
          <span class="text-[10px] uppercase font-bold text-on-surface-variant tracking-wider">Sắp xếp:</span>
          <select id="catalog-sort" class="text-xs bg-white border border-outline-variant py-1.5 px-3 focus:ring-0 focus:border-primary">
            <option value="latest">Mới nhất</option>
            <option value="price-asc">Giá: Thấp - Cao</option>
            <option value="price-desc">Giá: Cao - Thấp</option>
          </select>
        </div>
      </div>
      
      <!-- Category Tabs selection -->
      <div class="flex gap-xs border-b border-outline-variant overflow-x-auto no-scrollbar pb-1">
        <button onclick="setCategoryFilter('all')" data-cat="all" class="cat-tab px-md py-2 text-xs uppercase tracking-widest font-bold border-b-2 border-transparent transition-all">Tất cả</button>
        <button onclick="setCategoryFilter('tees')" data-cat="tees" class="cat-tab px-md py-2 text-xs uppercase tracking-widest font-bold border-b-2 border-transparent transition-all">Áo Thun</button>
        <button onclick="setCategoryFilter('hoodies')" data-cat="hoodies" class="cat-tab px-md py-2 text-xs uppercase tracking-widest font-bold border-b-2 border-transparent transition-all">Áo Khoác</button>
        <button onclick="setCategoryFilter('pants')" data-cat="pants" class="cat-tab px-md py-2 text-xs uppercase tracking-widest font-bold border-b-2 border-transparent transition-all">Quần</button>
      </div>
    </section>

    <!-- Product Grid -->
    <section class="mb-xl">
      <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 gap-lg">
        <!-- Products populated here -->
      </div>
      <div id="empty-state" class="hidden text-center py-20 space-y-sm">
        <span class="material-symbols-outlined text-4xl text-on-surface-variant font-light">search_off</span>
        <p class="text-sm text-on-surface-variant uppercase tracking-widest font-semibold">Không tìm thấy sản phẩm phù hợp</p>
      </div>
    </section>

  </main>

  <!-- Side Shopping Cart Drawer -->
  <div id="cart-drawer-overlay" class="fixed inset-0 bg-black/40 z-50 opacity-0 pointer-events-none transition-opacity duration-300"></div>
  <div id="cart-drawer" class="fixed top-0 right-0 h-full w-full sm:w-[450px] bg-white z-50 shadow-2xl translate-x-full transition-transform duration-300 flex flex-col">
    <div class="flex justify-between items-center px-md py-sm border-b border-outline-variant">
      <h3 class="font-bold uppercase tracking-wider text-sm flex items-center gap-xs">
        <span class="material-symbols-outlined">shopping_bag</span>
        Giỏ Hàng (<span class="cart-count">0</span>)
      </h3>
      <button id="close-cart-btn" class="material-symbols-outlined text-primary text-xl active:scale-95 hover:opacity-75">close</button>
    </div>
    <!-- Cart Items list -->
    <div id="cart-drawer-list" class="flex-1 overflow-y-auto px-md py-sm">
      <!-- Items dynamically populated -->
    </div>
    <!-- Cart Bottom summary -->
    <div class="border-t border-outline-variant p-md bg-surface-container-low space-y-md">
      <div class="flex justify-between items-center text-sm">
        <span class="font-medium tracking-wide uppercase">Tổng cộng:</span>
        <span class="cart-subtotal font-bold text-lg">0đ</span>
      </div>
      <button onclick="showToast('Cảm ơn bạn đã đặt hàng! Hóa đơn đã được lưu.')" class="w-full py-3 bg-primary text-on-primary text-xs font-bold uppercase tracking-widest hover:bg-neutral-800 transition-all active:scale-95">Tiến hành đặt hàng</button>
    </div>
  </div>

  <!-- Bottom Mobile Navigation Bar -->
  <nav class="fixed bottom-0 left-0 w-full h-[64px] bg-surface/95 backdrop-blur-md border-t border-outline-variant flex justify-around items-center z-40 md:hidden">
    <a href="./index.html" class="flex flex-col items-center justify-center text-on-surface-variant opacity-75">
      <span class="material-symbols-outlined">home</span>
      <span class="text-[9px] font-bold uppercase tracking-tighter mt-1">Trang chủ</span>
    </a>
    <a href="./categories.html" class="flex flex-col items-center justify-center text-primary active-tab">
      <span class="material-symbols-outlined">search</span>
      <span class="text-[9px] font-bold uppercase tracking-tighter mt-1">Tìm kiếm</span>
    </a>
    <a href="./categories.html?favorites=true" class="flex flex-col items-center justify-center text-on-surface-variant opacity-75">
      <span class="material-symbols-outlined">favorite</span>
      <span class="text-[9px] font-bold uppercase tracking-tighter mt-1">Yêu thích</span>
    </a>
    <a href="./info.html" class="flex flex-col items-center justify-center text-on-surface-variant opacity-75">
      <span class="material-symbols-outlined">info</span>
      <span class="text-[9px] font-bold uppercase tracking-tighter mt-1">Thông tin</span>
    </a>
  </nav>

  <!-- Core Javascript -->
  <script src="./assets/js/main.js"></script>

  <!-- Catalog Render Logic -->
  <script>
    let activeFilter = 'all';
    let searchQuery = '';
    let sortOrder = 'latest';
    let showFavoritesOnly = false;

    function renderCatalog() {
      const grid = document.getElementById('product-grid');
      const emptyState = document.getElementById('empty-state');
      
      let filtered = [...PRODUCTS];

      // Filter by category
      if (activeFilter !== 'all') {
        filtered = filtered.filter(p => p.category === activeFilter);
      }

      // Filter by search query
      if (searchQuery) {
        filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.desc.toLowerCase().includes(searchQuery.toLowerCase()));
      }

      // Filter by favorites only (favorites parameter from URL or mobile nav click)
      if (showFavoritesOnly) {
        filtered = filtered.filter(p => favorites.includes(p.id));
      }

      // Sort logic
      if (sortOrder === 'price-asc') {
        filtered.sort((a, b) => a.price - b.price);
      } else if (sortOrder === 'price-desc') {
        filtered.sort((a, b) => b.price - a.price);
      }

      if (filtered.length === 0) {
        grid.classList.add('hidden');
        emptyState.classList.remove('hidden');
      } else {
        grid.classList.remove('hidden');
        emptyState.classList.add('hidden');
        
        grid.innerHTML = filtered.map(product => {
          return `
            <article class="group relative flex flex-col">
              <div class="relative overflow-hidden bg-white aspect-square img-zoom-container border border-outline-variant">
                <a href="./product.html?id=${product.id}">
                  <img alt="${product.name}" class="w-full h-full object-cover" src="${product.image}">
                </a>
                <button onclick="toggleFavAndRefresh('${product.id}')" data-product-id="${product.id}" class="fav-btn absolute bottom-3 right-3 w-8 h-8 rounded-full bg-white/80 backdrop-blur-sm flex items-center justify-center text-primary shadow active:scale-90 hover:bg-white transition-all">
                  <span class="material-symbols-outlined text-base">favorite</span>
                </button>
              </div>
              <div class="mt-md flex justify-between items-start flex-1">
                <div class="max-w-[70%]">
                  <h4 class="text-sm font-semibold tracking-tight text-on-surface hover:underline">
                    <a href="./product.html?id=${product.id}">${product.name}</a>
                  </h4>
                  <p class="text-[10px] text-on-surface-variant tracking-widest mt-1">${product.edition}</p>
                </div>
                <span class="font-bold text-sm">${formatVND(product.price)}</span>
              </div>
              <button onclick="addToCart('${product.id}')" class="mt-sm w-full py-2 bg-primary text-on-primary text-xs uppercase tracking-widest font-bold hover:bg-neutral-800 transition-all active:scale-95">Thêm vào giỏ</button>
            </article>
          `;
        }).join('');
      }

      // Update favorite icon states
      updateFavoritesUI();
      // Update Tab CSS styles
      document.querySelectorAll('.cat-tab').forEach(tab => {
        if (tab.getAttribute('data-cat') === activeFilter) {
          tab.classList.add('border-primary', 'text-primary');
          tab.classList.remove('text-on-surface-variant');
        } else {
          tab.classList.remove('border-primary', 'text-primary');
          tab.classList.add('text-on-surface-variant');
        }
      });
    }

    function toggleFavAndRefresh(id) {
      toggleFavorite(id);
      if (showFavoritesOnly) {
        renderCatalog();
      } else {
        updateFavoritesUI();
      }
    }

    function setCategoryFilter(category) {
      activeFilter = category;
      showFavoritesOnly = false; // Switch off favorites if tabs are explicitly clicked
      renderCatalog();
    }

    document.getElementById('catalog-search').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderCatalog();
    });

    document.getElementById('catalog-sort').addEventListener('change', (e) => {
      sortOrder = e.target.value;
      renderCatalog();
    });

    // On Load: parse URL params
    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const categoryParam = params.get('filter');
      const searchTrigger = params.get('search');
      const favsTrigger = params.get('favorites');
      
      if (categoryParam) {
        activeFilter = categoryParam;
      }
      
      if (searchTrigger) {
        document.getElementById('catalog-search').focus();
      }

      if (favsTrigger === 'true') {
        showFavoritesOnly = true;
      }

      renderCatalog();
    });
  </script>

</body>
</html>
